language: typescript
tasks:
  browser-install:
    toolchain: node
    preset: utility
    env:
      PLAYWRIGHT_BROWSERS_PATH: $workspaceRoot/.tmp/browsers
    script: yarn dlx tsx $projectRoot/moon-tasks/browser-install.ts
  git-shallow-remove:
    preset: utility
    script: $projectRoot/moon-tasks/git-shallow-remove.ts
  collect-workspace-targets:
    preset: utility
    script: $projectRoot/moon-tasks/collect-workspace-targets.ts
  versions-patch:
    preset: utility
    script: $projectRoot/moon-tasks/versions-patch.ts
  check:
    deps:
    - ~:biome-check
    - ~:syncpack-lint
tags:
- biome
- syncpack
project:
  description: scripts
  title: '@mcp-browser-kit/scripts'
toolchains:
  default: node
