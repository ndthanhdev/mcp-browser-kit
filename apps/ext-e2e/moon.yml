$schema: https://moonrepo.dev/schemas/project.json
language: typescript
tasks:
  build:
    deps:
    - m2:build
    - m3:build
    - ext-e2e-test-app:build
  test:
    options:
      runDepsInParallel: false
    deps:
    - ~:playwright-test
  playwright-test:
    options:
      runDepsInParallel: false
    deps:
    - ~:build
tags:
- playwright
dependsOn:
- core-utils
- core-server
toolchains:
  default: node
