$schema: https://moonrepo.dev/schemas/project.json
language: typescript
tasks:
  build:
    deps:
    - m2:build
    - m3:build
    - ext-e2e-test-app:build
  test:
    options:
      runDepsInParallel: false
      runInCI: false
    deps:
    - ~:playwright-test
  playwright-test:
    options:
      runDepsInParallel: false
      runInCI: false
    deps:
    - ~:build
  merge-reports:
    toolchain: node
    options:
      runInCI: false
    env:
      PLAYWRIGHT_BROWSERS_PATH: $workspaceRoot/.tmp/browsers
    script: playwright merge-reports --reporter html ./all-blob-reports
tags:
- playwright
dependsOn:
- core-utils
- core-server
toolchains:
  default: node
